<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Atlantis Apps Launcher</title>
</head>
<body>
  <h1>Atlantis Apps Launcher</h1>

  <button onclick="atlantis.run('start-icebreakrz.bat')">Start IceBreakrz</button>
  <button onclick="atlantis.run('start-popoff.bat')">Start Pop Off</button>
  <button onclick="atlantis.run('start-command-center.bat')">Start Command Center</button>
  <button onclick="atlantis.run('start-n8n.bat')">Start n8n</button>
  <button onclick="atlantis.run('start-docker.bat')">Start Docker Desktop</button>
  <button onclick="atlantis.run('start-mkdocs.bat')">MkDocs</button>

  <hr>

  <button class="danger" onclick="atlantis.run('stop-all.bat')">Stop All Apps</button>
</body>
</html>
