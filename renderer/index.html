<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Atlantis Apps Launcher</title>
</head>
<body>
  <h1>Atlantis Apps Launcher</h1>
  <div class="version-label">v1.5</div>

  <div class="app-row">
    <span id="icebreakrz-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-icebreakrz')">
      <img src="icons/icebreakrz.png" class="icon">
      Start IceBreakrz
    </button>
  </div>

  <div class="app-row">
    <span id="popoff-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-popoff')">
      <img src="icons/popoff.png" class="icon">
      Start Pop Off
    </button>
  </div>

  <div class="app-row">
    <span id="command-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-command-center')">
      <img src="icons/command-center.png" class="icon">
      Start Command Center
    </button>
  </div>

  <div class="app-row">
    <span id="n8n-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-n8n')">
      <img src="icons/n8n.png" class="icon">
      Start n8n
    </button>
  </div>

  <div class="app-row">
    <span id="docker-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-docker')">
      <img src="icons/docker.png" class="icon">
      Start Docker Desktop
    </button>
  </div>

  <div class="app-row">
    <span id="mkdocs-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-mkdocs')">
      <img src="icons/mkdocs.png" class="icon">
      MkDocs
    </button>
  </div>

  <div class="app-row">
    <span id="ntfy-status" class="status-dot"></span>
    <button class="app-btn" onclick="window.atlantis.run('start-ntfy')">
      <img src="icons/ntfy.png" class="icon">
      Start NTFY
    </button>
  </div>

  <hr>

  <button class="danger" onclick="window.atlantis.run('stop-all')">
    Stop All Apps
  </button>

  <script src="renderer.js"></script>
</body>
</html>
